<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}">
<head><title>Login</title></head>
<body>
<div layout:fragment="content">
    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <h1 th:text="#{titleLogin}">Login</h1>
                <form th:action="@{'/' + ${urlLocale} + '/login'}" method="post" id="login-form">
                    <div class="mb-3">
                        <label for="email" class="form-label" th:text="#{labelEmail}">Email</label>
                        <input type="email" class="form-control" id="email" name="email" required/>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label" th:text="#{labelPassword}">Password</label>
                        <input type="password" class="form-control" id="password" name="password" required/>
                    </div>
                    <button type="submit" class="btn btn-primary" id="btn-login" th:text="#{titleLogin}">Login</button>
                </form>
                <p class="mt-3" th:text="#{labelNoAccount}">Don't have an account?
                    <a th:href="@{'/' + ${urlLocale} + '/register'}" id="register-link" th:text="#{headerRegistration}">Register</a>
                </p>
            </div>
        </div>
    </div>
</div>
</body>
</html>
