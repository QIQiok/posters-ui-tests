<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}">
<head><title>Register</title></head>
<body>
<div layout:fragment="content">
    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <h1 th:text="#{titleCreateAccount}">Create Account</h1>
                <form th:action="@{'/' + ${urlLocale} + '/register'}" method="post" id="register-form">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="firstName" class="form-label" th:text="#{labelFirstName}">First Name</label>
                            <input type="text" class="form-control" id="firstName" name="firstName" required/>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="name" class="form-label" th:text="#{labelLastName}">Last Name</label>
                            <input type="text" class="form-control" id="name" name="name" required/>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label" th:text="#{labelEmail}">Email</label>
                        <input type="email" class="form-control" id="email" name="email" required/>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label" th:text="#{labelPassword}">Password</label>
                        <input type="password" class="form-control" id="password" name="password" required minlength="6"/>
                    </div>
                    <button type="submit" class="btn btn-primary" id="btn-register" th:text="#{headerRegistration}">Register</button>
                </form>
                <p class="mt-3" th:text="#{labelHaveAccount}">Already have an account?
                    <a th:href="@{'/' + ${urlLocale} + '/login'}" id="login-link" th:text="#{titleLogin}">Login</a>
                </p>
            </div>
        </div>
    </div>
</div>
</body>
</html>
