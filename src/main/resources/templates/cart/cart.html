<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}">
<head><title>Shopping Cart</title></head>
<body>
<div layout:fragment="content">
    <div class="container mt-4">
        <h1 th:text="#{titleShoppingCart}">Shopping Cart</h1>
        <div id="cart-content">
            <div th:if="${cart != null and not #lists.isEmpty(cart.products)}" class="row g-4 align-items-start">
                <!-- Left: Items -->
                <div class="col-lg-8">
                    <div class="card border-0 shadow-sm cart-items-card">
                        <div class="card-header bg-white border-bottom-0 pt-4 pb-0">
                            <h3 class="card-title fw-bold" th:text="#{labelOrderItems}">Order Items</h3>
                        </div>
                        <div class="card-body p-0">
                            <ul class="list-group list-group-flush" id="cart-item-list">
                                <li class="list-group-item p-4 js-cart-product" th:each="cp : ${cart.products}" th:id="'cart-item-' + ${cp.lineItemId}">
                                    <div class="row align-items-center g-3">
                                        <!-- Image & Product Details -->
                                        <div class="col-12 col-md-5 d-flex align-items-center mb-3 mb-md-0">
                                            <a th:href="@{'/' + ${urlLocale} + '/product/' + ${cp.productName} + '/' + ${cp.productId}}" class="flex-shrink-0 d-block">
                                                <img th:src="@{${cp.imageURL}}" th:alt="${cp.productName}" class="rounded shadow-sm" style="width: 80px; height: 80px; object-fit: cover;">
                                            </a>
                                            <div class="ms-4 flex-grow-1">
                                                <a th:href="@{'/' + ${urlLocale} + '/product/' + ${cp.productName} + '/' + ${cp.productId}}" 
                                                   class="text-decoration-none text-dark fw-bold fs-5 d-block mb-1" th:text="${cp.productName}">Poster Name</a>
                                                <div class="text-muted small mb-0">
                                                    <span th:text="${cp.sizeLabel}">16 x 12 in</span> &bull; 
                                                    <span th:text="${#strings.capitalize(cp.finish)}">Matte</span>
                                                </div>
                                            </div>
                                        </div>
                                        
                                        <!-- Price -->
                                        <div class="col-4 col-md-2 text-md-center">
                                            <div class="d-md-none text-muted small mb-1" th:text="#{labelPrice}">Price</div>
                                            <span class="fw-medium text-muted" th:text="${#numbers.formatCurrency(cp.price)}">$0.00</span>
                                        </div>

                                        <!-- Quantity -->
                                        <div class="col-4 col-md-2 d-flex justify-content-md-center">
                                            <div class="d-md-none text-muted small mb-1 d-none" th:text="#{labelQuantity}">Qty</div>
                                            <input type="number" th:value="${cp.productCount}" min="1" max="999"
                                                   class="form-control form-control-sm cart-qty-input text-center fw-bold"
                                                   style="width: 70px; border-radius: 0.5rem;" th:id="'qty-' + ${cp.lineItemId}"
                                                   name="productCount"
                                                   hx-trigger="change"
                                                   th:hx-post="@{'/' + ${urlLocale} + '/updateProductCount?cartProductId=' + ${cp.lineItemId}}"
                                                   hx-target="#cart-content"
                                                   hx-swap="innerHTML"
                                                   hx-include="this"/>
                                        </div>

                                        <!-- Total & Remove -->
                                        <div class="col-4 col-md-3 text-end d-flex flex-column align-items-end justify-content-center">
                                            <div class="d-md-none text-muted small mb-1" th:text="#{labelTotal}">Total</div>
                                            <span class="fw-bold fs-5 text-dark mb-2" th:text="${#numbers.formatCurrency(cp.totalProductPrice)}" th:id="'total-' + ${cp.lineItemId}">$0.00</span>
                                            <button class="btn btn-sm btn-link text-danger text-decoration-none p-0 cart-remove-btn opacity-75 hover-opacity-100"
                                                    th:hx-confirm="#{confirmRemoveFromCart}"
                                                    th:hx-post="@{'/' + ${urlLocale} + '/deleteFromCart?cartProductId=' + ${cp.lineItemId}}"
                                                    hx-target="#cart-content"
                                                    hx-swap="innerHTML" title="Remove">
                                                <i class="bi bi-trash3 me-1"></i> <small th:text="#{buttonRemove}">Remove</small>
                                            </button>
                                        </div>
                                    </div>
                                </li>
                            </ul>
                        </div>
                    </div>
                </div>
                
                <!-- Right: Summary Card -->
                <div class="col-lg-4">
                    <div class="card border-0 shadow-sm cart-summary-card" style="position: sticky; top: 100px;">
                        <div class="card-body p-4">
                            <h3 class="card-title cart-summary-title mb-4 fw-bold" th:text="#{titleOrderSummary}">Order Summary</h3>
                            <div class="cart-summary-row">
                                <span class="text-muted" th:text="#{labelSubtotal}">Subtotal</span>
                                <span th:text="${#numbers.formatCurrency(cart.subTotalPrice)}" id="cart-subtotal">$0.00</span>
                            </div>
                            <div class="cart-summary-row">
                                <span class="text-muted">Tax (<span th:text="${cart.taxAsString}">6.0</span>%)</span>
                                <span th:text="${#numbers.formatCurrency(cart.totalTaxPrice)}" id="cart-tax">$0.00</span>
                            </div>
                            <div class="cart-summary-row">
                                <span class="text-muted" th:text="#{labelShipping}">Shipping</span>
                                <span th:text="${#numbers.formatCurrency(cart.shippingCosts)}">$0.00</span>
                            </div>
                            <div class="cart-summary-total">
                                <span class="fw-bold">Total</span>
                                <span class="fw-bold cart-summary-total-price" th:text="${#numbers.formatCurrency(cart.totalPrice)}" id="cart-total">$0.00</span>
                            </div>
                            <a th:href="@{'/' + ${urlLocale} + '/checkout/shippingAddress'}" class="btn btn-primary w-100 btn-lg mt-3" id="btn-checkout" th:text="#{buttonCheckout}">Checkout</a>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Empty State -->
            <div th:if="${cart == null or #lists.isEmpty(cart.products)}" class="text-center py-5 mt-5">
                <i class="bi bi-cart-x text-muted mb-3 d-block" style="font-size: 5rem; opacity: 0.5;"></i>
                <h2 class="mb-3" style="font-family: 'Rokkitt', serif;" th:text="#{labelYourCartEmpty}">Your cart is empty.</h2>
                <p class="text-muted mb-4 fs-5">Looks like you haven't added any posters to your cart yet.</p>
                <a th:href="@{'/' + ${urlLocale} + '/'}" class="btn btn-primary btn-lg px-5 shadow-sm" th:text="#{buttonContinueShopping}">Continue Shopping</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
