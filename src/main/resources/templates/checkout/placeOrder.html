<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/checkoutLayout}">
<head><title>Review Order</title></head>
<body>
<div layout:fragment="content">
    <div class="container mt-4" th:if="${cart != null}">
        <h1 class="mb-4" th:text="#{titleReviewOrder}">Review &amp; Place Order</h1>
        <div class="row g-4 align-items-start">
            <div class="col-lg-8">
                <div class="card border-0 shadow-sm cart-items-card">
                    <div class="card-header bg-white border-bottom-0 pt-4 pb-0">
                        <h3 class="card-title fw-bold" th:text="#{labelOrderItems}">Order Items</h3>
                    </div>
                    <div class="table-responsive mb-0 p-3 pt-0">
                        <table class="table align-middle mb-0" id="checkout-table">
                            <thead>
                                <tr class="text-uppercase text-muted" style="font-size: 0.85rem;">
                                    <th th:text="#{labelProduct}">Product</th>
                                    <th th:text="#{labelSize}">Size</th>
                                    <th th:text="#{labelFinish}">Finish</th>
                                    <th class="text-center" th:text="#{labelQuantity}">Qty</th>
                                    <th class="text-end" th:text="#{labelPrice}">Price</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="cp : ${cart.lineItems}">
                                    <td class="fw-bold" th:text="${cp.sku}">Product</td>
                                    <td th:text="'-'">16x12</td>
                                    <td th:text="'-'">Matte</td>
                                    <td class="text-center" th:text="${cp.quantity}">1</td>
                                    <td class="text-end fw-bold" th:text="'-'">$0.00</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
            
            <div class="col-lg-4">
                <div class="card border-0 shadow-sm cart-summary-card" style="position: sticky; top: 100px;">
                    <div class="card-body p-4">
                        <h3 class="card-title cart-summary-title mb-4 fw-bold" th:text="#{labelSummary}">Summary</h3>
                        <div class="cart-summary-row">
                            <span class="text-muted" th:text="#{labelSubtotal}">Subtotal</span>
                            <span th:text="${#numbers.formatCurrency(cart.subTotal)}">$0.00</span>
                        </div>
                        <div class="cart-summary-row">
                            <span class="text-muted">Tax (<span th:text="${cart.taxRate * 100 + '%'}">6.0%</span>)</span>
                            <span th:text="${#numbers.formatCurrency(cart.totalTax)}">$0.00</span>
                        </div>
                        <div class="cart-summary-row">
                            <span class="text-muted" th:text="#{labelShipping}">Shipping</span>
                            <span th:text="${#numbers.formatCurrency(cart.shippingCosts)}">$0.00</span>
                        </div>
                        <div class="cart-summary-total align-items-center">
                            <span class="fw-bold">Total</span>
                            <span class="fw-bold cart-summary-total-price text-primary fs-3" th:text="${#numbers.formatCurrency(cart.total)}">$0.00</span>
                        </div>
                        <!-- Payment Method -->
                        <div class="bg-light rounded p-3 mt-3 mb-3" th:if="${maskedCardNumber != null}">
                            <h6 class="fw-bold mb-2 text-uppercase" style="font-size: 0.75rem; letter-spacing: 0.5px;">Payment Method</h6>
                            <div class="text-dark small d-flex align-items-center">
                                <i class="bi bi-credit-card fs-4 me-2 text-muted"></i>
                                <div>
                                    <span class="d-block fw-medium" th:text="${cart.creditCard.vendor}">Visa</span>
                                    <span class="text-muted" th:text="${maskedCardNumber}">411111******1111</span>
                                </div>
                            </div>
                        </div>
                        <form th:action="@{'/' + ${urlLocale} + '/checkout/placeOrder'}" method="post">
                            <button type="submit" class="btn btn-primary btn-lg w-100 mt-3" id="btn-place-order" th:text="#{buttonPlaceOrder}">Place Order</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
