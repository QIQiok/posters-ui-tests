<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<!--
    Mini-cart dropdown fragment. Loaded via HTMX into #mini-cart-content.
    Also includes OOB swap for the header cart counter.
-->
<body>
<!-- OOB: update header cart count -->
<span id="header-cart-count" class="header-cart-product-count"
      hx-swap-oob="true"
      th:text="${cartProductCount}">0</span>

<!-- Main mini-cart content (swapped into #mini-cart-content) -->
<div th:fragment="miniCartContent">
    <div th:if="${cartProducts == null or #lists.isEmpty(cartProducts)}" class="cart-mini-empty">
        <span th:text="#{miniCartEmpty}">Your cart is empty.</span>
    </div>
    <th:block th:if="${cartProducts != null and not #lists.isEmpty(cartProducts)}">
        <div class="cart-mini-header">
            <div class="cart-mini-product-counter">
                <span class="value font-bold" th:text="${cartProductCount}">0</span>
                <span th:text="${cartProductCount == 1} ? #{miniCartItem} : #{miniCartItems}">items</span>
            </div>
        </div>
        <div class="cart-mini-element-list-wrap">
            <ul class="list-unstyled cart-mini-element-list">
                <li th:each="cp : ${cartProducts}" class="cart-mini-products-list-items">
                    <ul class="cart-items list-unstyled">
                        <li class="prod-name" th:text="${cp.productName}">Product</li>
                        <li>Quantity: <span class="prod-count" th:text="${cp.productCount}">1</span>
                            (<span class="prod-style" th:text="${cp.finish}">matte</span>,
                            <span class="prod-size" th:text="${cp.sizeLabel}">16 x 12 in</span>)
                        </li>
                        <li>
                            <div class="prod-price text-right">
                                <strong th:text="${#numbers.formatCurrency(cp.totalProductPrice)}">$0.00</strong>
                            </div>
                        </li>
                    </ul>
                </li>
            </ul>
        </div>
        <div class="cart-mini-total">
            <div class="cart-mini-suborder-total row">
                <div class="col-sm-7 text-left labelText" th:text="#{miniCartSubTotal}">Subtotal</div>
                <div class="col-sm-5 text-right value">
                    <div class="suborder-price" th:text="${#numbers.formatCurrency(subTotalPrice)}">$0.00</div>
                </div>
            </div>
            <div class="link-button">
                <a th:href="@{'/' + ${urlLocale} + '/cart'}"
                   class="btn btn-primary form-control go-to-cart" th:text="#{buttonGoToCart}">Go to Cart</a>
            </div>
        </div>
    </th:block>
</div>
</body>
</html>
