<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Break / Testing Controls</title>
    <link rel="stylesheet" th:href="@{/assets/css/bootstrap.css}"/>
</head>
<body>
    <div class="container mt-4">
        <h1>Break Controls</h1>
        <p class="text-muted">Toggle intentional bugs for testing/demo purposes.</p>

        <div class="row" id="break-controls">
            <div class="col-md-6 mb-3" th:each="entry : ${status}">
                <div class="card">
                    <div class="card-body d-flex justify-content-between align-items-center">
                        <span th:text="${entry.key}">Feature</span>
                        <span th:text="${entry.value}" class="badge"
                              th:classappend="${entry.value.toString() == 'true'} ? 'bg-danger' : 'bg-secondary'">
                            value
                        </span>
                    </div>
                </div>
            </div>
        </div>
        <div class="mt-3">
            <button class="btn btn-danger" onclick="disableAll()" id="btn-disable-all">Disable All</button>
        </div>
    </div>

    <script>
        function disableAll() {
            fetch('/break/disableAll', { method: 'POST' })
              .then(r => r.json())
              .then(() => location.reload());
        }
    </script>
</body>
</html>
