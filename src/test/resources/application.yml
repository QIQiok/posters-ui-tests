spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  sql:
    init:
      mode: never
  h2:
    console:
      enabled: false

posters:
  currency: "$"
  shipping-costs: 7.00
  tax: 0.06
  unit-of-length: "in"
  page-size: 8
  languages: "en-US"
  version: "test"
  import-customer: false
  lucene-index-dir: "/tmp/test-lucene-index"
  regex:
    zip: "[0-9]+"
    name: "[A-Za-z ]+"
    credit-card: "4[0-9]{12}(?:[0-9]{3})?"
    email: "[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+.[A-Za-z]{2,4}"
    product-count: "[0-9]{1,3}"

logging:
  level:
    root: WARN
    com.xceptance.posters: INFO
    org.hibernate.SQL: DEBUG
